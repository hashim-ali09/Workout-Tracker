				root.querySelector("#importInput").onchange = importData;
				root.querySelector("#showMissed").onchange = (e) => {
					state.data.settings.showMissedDays = !!e.target.checked;
					autosave();
					toast("Preference saved");
				};
				const addHolidayBtn = root.querySelector("#addHolidayBtn");
				if (addHolidayBtn) {
					addHolidayBtn.onclick = () => {
						const d = root.querySelector("#holidayDate").value;
						const name = (root.querySelector("#holidayName").value || "Holiday").trim();
						if (!d) return toast("Select a holiday date");
						state.data.settings.holidays = (state.data.settings.holidays || []).filter((h) => h.date !== d);
						state.data.settings.holidays.push({ date: d, name: name || "Holiday" });
						autosave();
						toast("Holiday added");
						render();
					};
				}
				root.querySelectorAll("[data-del-holiday]").forEach((btn) => {
					btn.onclick = () => {
						state.data.settings.holidays = (state.data.settings.holidays || []).filter((h) => h.date !== btn.dataset.delHoliday);
						autosave();
						render();
					};
				});
				root.querySelector("#clearAllBtn").onclick = () => {
					if (!confirm("Delete all app data permanently?")) return;
					state.data = defaultData();
					state.selectedDate = todayISO();
					state.calendarCursor = monthStart(state.selectedDate);
					state.analyticsExerciseId = "";
					autosave();
					toast("All data cleared");
					render();
				};
			}

			function saveCurrentWorkout() {
				const w = getOrInitWorkout(state.selectedDate);
				w.exercises.forEach((ex) => {
					ex.intensityMode = ["normal", "drop", "superset"].includes(ex.intensityMode) ? ex.intensityMode : "normal";
					ex.supersetWith = ex.intensityMode === "superset" ? String(ex.supersetWith || "").trim() : "";
					ex.dropSetNote = ex.intensityMode === "drop" ? String(ex.dropSetNote || "").trim() : "";
					if (ex.type === "cardio") {
						ex.sets = (ex.sets || []).map((s) => ({
							durationSec: Number(s.durationSec) || 0,
							distanceKm: normalizeNum(s.distanceKm)
						})).filter((s) => s.durationSec > 0 || s.distanceKm !== "");
					} else {
						ex.sets = (ex.sets || [])
							.map((s) => normalizeStrengthSetByMode(s, ex.intensityMode))
							.filter((s) => hasAnyLoggedStrengthValue(s, ex.intensityMode));
					}
				});
				w.updatedAt = new Date().toISOString();
				autosave();
				openWorkoutSummaryModal(w);
				toast("Workout saved");
				render();
			}

			function autofillFromLastWeek() {
				const w = getOrInitWorkout(state.selectedDate);
				const hasExisting = w.exercises.some((ex) => (ex.sets || []).some((s) => ex.type === "cardio"
					? (Number(s.durationSec) || 0) > 0 || normalizeNum(s.distanceKm) !== ""
					: normalizeNum(s.weight) !== "" || normalizeNum(s.reps) !== ""));
				if (hasExisting && !confirm("Replace current sets with exact last-week sets where available?")) return;
				let copied = 0;
				for (const ex of w.exercises) {
					const exact = getExactLastWeekSets(ex.exerciseId, state.selectedDate);
					if (!exact || !exact.sets.length) continue;
					ex.sets = exact.type === "cardio"
						? exact.sets.map((s) => ({ durationSec: Number(s.durationSec) || 0, distanceKm: normalizeNum(s.distanceKm) }))
						: exact.sets.map((s) => normalizeStrengthSetByMode(s, ex.intensityMode));
					copied++;
				}

				if (!copied) {
					toast("No exact last-week records found");
					return;
				}

				w.updatedAt = new Date().toISOString();
				autosave();
				toast(`Loaded last-week sets for ${copied} exercise${copied === 1 ? "" : "s"}`);
				render();
			}

			function getWorkoutOrDefault(dateIso) {
				if (state.data.workouts[dateIso]) {
					return state.data.workouts[dateIso];
				}
				// Return a default object without persisting
				const split = getDefaultSplitForDate(dateIso);
				return {
					date: dateIso,
					splitId: split.id,
					splitName: split.name,
					exercises: split.exercises.map((e) => ({ exerciseId: e.id, name: e.name, type: e.type || "strength", sets: [], intensityMode: "normal", supersetWith: "", dropSetNote: "" })),
					notes: "",
					updatedAt: new Date().toISOString()
				};
			}

			function getOrInitWorkout(dateIso) {
				if (!state.data.workouts[dateIso]) {
					const split = getDefaultSplitForDate(dateIso);
					state.data.workouts[dateIso] = {
						date: dateIso,
						splitId: split.id,
						splitName: split.name,
						exercises: split.exercises.map((e) => ({ exerciseId: e.id, name: e.name, type: e.type || "strength", sets: [], intensityMode: "normal", supersetWith: "", dropSetNote: "" })),
						notes: "",
						updatedAt: new Date().toISOString()
					};
					autosave();
				}
				return state.data.workouts[dateIso];
			}

			function getDefaultSplitForDate(dateIso) {
				const scheduledId = getScheduledSplitIdForDate(dateIso);
				const scheduled = scheduledId ? getSplitById(scheduledId) : null;
				return scheduled || state.data.splits[0] || { id: "", name: "Unassigned", exercises: [] };
			}

			function getScheduledSplitIdForDate(dateIso) {
				const d = new Date(dateIso + "T00:00:00");
				const day = d.getDay();
				const arr = getWeekScheduleForDate(dateIso);
				return arr[day] || "";
			}

			function getWeekScheduleForDate(dateIso) {
				const base = normalizeWeekSchedule(state.data.settings.weekSchedule || []);
				const override = getWeekOverrideForDate(dateIso);
				const validSplitIds = new Set((state.data.splits || []).map((s) => s.id));
				const sanitize = (arr) => normalizeWeekSchedule(arr).map((id) => (validSplitIds.has(id) ? id : ""));
				if (!override || !Array.isArray(override.schedule)) return sanitize(base);
				return sanitize(override.schedule);
			}

			function normalizeWeekSchedule(arr) {
				const next = Array.isArray(arr) ? arr.slice(0, 7) : [];
				while (next.length < 7) next.push("");
				return next.map((id) => (typeof id === "string" ? id : ""));
			}

			function getWeekStartISO(dateIso) {
				const d = new Date(dateIso + "T00:00:00");
				d.setDate(d.getDate() - d.getDay());
				return toISO(d);
			}

			function getWeekOverrideForDate(dateIso) {
				const weekStart = getWeekStartISO(dateIso);
				const map = state.data.settings.weekOverrides || {};
				return map[weekStart] || null;
			}

			function applyBusyDayShift(dateIso) {
				const source = getWeekScheduleForDate(dateIso);
				const day = new Date(dateIso + "T00:00:00").getDay();
				const scheduledId = source[day] || "";
				if (!scheduledId) return toast("Selected day is already a rest day");

				const nextRest = source.findIndex((id, idx) => idx > day && !id);
				if (nextRest < 0) {
					return toast("No rest day left later this week to swap with");
				}

				const shifted = source.slice();
				shifted[day] = "";
				for (let i = day + 1; i <= nextRest; i++) {
					shifted[i] = source[i - 1] || "";
				}

				const weekStart = getWeekStartISO(dateIso);
				if (!state.data.settings.weekOverrides || typeof state.data.settings.weekOverrides !== "object") {
					state.data.settings.weekOverrides = {};
				}
				state.data.settings.weekOverrides[weekStart] = {
					schedule: shifted,
					createdAt: new Date().toISOString()
				};
				autosave();
				toast("Week shifted for busy day. Normal schedule resumes next week");
				render();
			}

			function clearWeekOverrideForDate(dateIso) {
				const weekStart = getWeekStartISO(dateIso);
				if (!state.data.settings.weekOverrides || !state.data.settings.weekOverrides[weekStart]) return;
				delete state.data.settings.weekOverrides[weekStart];
				autosave();
				toast("Temporary week shift reverted");
				render();
			}

			function syncWorkoutExercisesToSplit(workout, split) {
				const existingMap = new Map((workout.exercises || []).map((e) => [e.exerciseId, e]));
				workout.exercises = split.exercises.map((e) => {
					const ex = existingMap.get(e.id);
					return {
						exerciseId: e.id,
						name: e.name,
						type: e.type || "strength",
						sets: ex ? ex.sets || [] : [],
						intensityMode: ex && ["normal", "drop", "superset"].includes(ex.intensityMode) ? ex.intensityMode : "normal",
						supersetWith: ex && typeof ex.supersetWith === "string" ? ex.supersetWith : "",
						dropSetNote: ex && typeof ex.dropSetNote === "string" ? ex.dropSetNote : ""
					};
				});
				workout.splitId = split.id;
				workout.splitName = split.name;
				workout.updatedAt = new Date().toISOString();
			}

			function ensureSelectedWorkoutMatchesSplit(dateIso) {
				const workout = state.data.workouts[dateIso];
				if (!workout) return;
				const split = getSplitById(workout.splitId);
				if (!split) return;
				if (!workoutNeedsSplitSync(workout, split)) return;
				syncWorkoutExercisesToSplit(workout, split);
				autosave();
			}

			function workoutNeedsSplitSync(workout, split) {
				if (!workout || !split) return false;
				const current = Array.isArray(workout.exercises) ? workout.exercises : [];
				const next = Array.isArray(split.exercises) ? split.exercises : [];
				if (current.length !== next.length) return true;
				for (let i = 0; i < next.length; i++) {
					const a = current[i];
					const b = next[i];
					if (!a || a.exerciseId !== b.id || a.name !== b.name || (a.type || "strength") !== (b.type || "strength")) return true;
				}
				return false;
			}

			function syncWorkoutsUsingSplitFromDate(splitId, fromDateIso = todayISO()) {
				const split = getSplitById(splitId);
				if (!split) return;
				Object.values(state.data.workouts).forEach((w) => {
					if (!w || w.splitId !== splitId || w.date < fromDateIso) return;
					syncWorkoutExercisesToSplit(w, split);
				});
			}

			function getSplitById(id) {
				return state.data.splits.find((s) => s.id === id) || null;
			}

			function listAllExercises() {
				const map = new Map();
				state.data.splits.forEach((s) => s.exercises.forEach((e) => map.set(e.id, { name: e.name, type: e.type || "strength" })));
				Object.values(state.data.workouts).forEach((w) => (w.exercises || []).forEach((e) => {
					if (!map.has(e.exerciseId)) map.set(e.exerciseId, { name: e.name, type: e.type || "strength" });
				}));
				return Array.from(map.entries()).map(([id, value]) => ({ id, name: value.name, type: value.type }));
			}

			function getExerciseSessions(exerciseId) {
				return Object.values(state.data.workouts)
					.filter((w) => Array.isArray(w.exercises))
					.map((w) => {
						const ex = w.exercises.find((e) => e.exerciseId === exerciseId);
						if (!ex || !ex.sets || !ex.sets.length) return null;
						return { date: w.date, splitName: w.splitName, sets: ex.sets, type: ex.type || "strength", intensityMode: ex.intensityMode || "normal" };
					})
					.filter(Boolean)
					.sort((a, b) => a.date.localeCompare(b.date));
			}

			function getExactLastWeekSets(exerciseId, forDate) {
				const target = addDays(forDate, -7);
				const w = state.data.workouts[target];
				if (!w || !Array.isArray(w.exercises)) return null;
				const ex = w.exercises.find((e) => e.exerciseId === exerciseId && (e.sets || []).length);
				if (!ex) return null;
				if (ex.type === "cardio") {
					return {
						date: target,
						type: "cardio",
						intensityMode: ex.intensityMode || "normal",
						sets: ex.sets.map((s) => ({ durationSec: Number(s.durationSec) || 0, distanceKm: normalizeNum(s.distanceKm) }))
					};
				}
				return {
					date: target,
					type: "strength",
					intensityMode: ex.intensityMode || "normal",
					sets: ex.sets.map((s) => normalizeStrengthSetByMode(s, ex.intensityMode || "normal"))
				};
			}

			function openHistoryModal(exerciseId) {
				const all = getExerciseSessions(exerciseId);
				const recent = all.slice(-5).reverse();
				const exName = (listAllExercises().find((x) => x.id === exerciseId) || {}).name || "Exercise";
				const exact = getExactLastWeekSets(exerciseId, state.selectedDate);

				$("modalTitle").textContent = exName + " • History";
				$("lastWeekExact").textContent = exact
					? exact.type === "cardio"
						? `Exact last week (${fmtDisplayDate(exact.date)}): ${exact.sets.map((s, i) => `Set ${i + 1}: ${formatDuration(Number(s.durationSec) || 0)}${safeNum(s.distanceKm) ? ` • ${safeNum(s.distanceKm)} km` : ""}`).join(" | ")}`
						: `Exact last week (${fmtDisplayDate(exact.date)}): ${exact.sets.map((s, i) => `Set ${i + 1}: ${s.weight} × ${s.reps}`).join(" | ")}`
					: "No exact workout found from one week ago.";

				$("historyList").innerHTML = recent.length
					? recent.map((s) => `<div class="session-line"><strong>${fmtDisplayDate(s.date)}</strong> <span class="tiny">(${escapeHtml(s.splitName || "Workout")})</span><div class="small" style="margin-top:6px;">${s.sets.map((set, i) => `Set ${i + 1}: ${formatSetForDisplay(set, s.type, s.intensityMode || "normal")}`).join(" • ")}</div></div>`).join("")
					: `<p class="small">No sessions recorded for this exercise yet.</p>`;

				$("historyModal").classList.add("show");
			}

			function closeHistoryModal() {
				$("historyModal").classList.remove("show");
			}

			function calcMetrics() {
				const workouts = Object.values(state.data.workouts).sort((a, b) => a.date.localeCompare(b.date));
				const totalWorkouts = workouts.length;
				const weekAgo = addDays(todayISO(), -6);
				const weeklyWorkouts = workouts.filter((w) => w.date >= weekAgo && w.date <= todayISO()).length;
				const totalSets = workouts.reduce((sum, w) => sum + (w.exercises || []).reduce((s, ex) => s + (ex.sets || []).length, 0), 0);
				const avgSets = totalWorkouts ? (totalSets / totalWorkouts).toFixed(1) : "0.0";
				return { totalWorkouts, weeklyWorkouts, avgSets };
			}

			function est1RM(weight, reps) {
				const w = Number(weight);
				const r = Number(reps);
				if (!Number.isFinite(w) || !Number.isFinite(r) || w <= 0 || r <= 0) return 0;
				return w * (1 + r / 30);
			}

			function calcStatsFromSets(sets) {
				let bestWeight = 0;
				let bestReps = 0;
				let bestE1RM = 0;
				(sets || []).forEach((s) => {
					const pairs = getStrengthPairsFromSet(s);
					pairs.forEach((pair) => {
						const w = Number(pair.weight);
						const r = Number(pair.reps);
						if (Number.isFinite(w) && w > bestWeight) bestWeight = w;
						if (Number.isFinite(r) && r > bestReps) bestReps = r;
						const e = est1RM(w, r);
						if (e > bestE1RM) bestE1RM = e;
					});
				});
				return { bestWeight, bestReps, bestE1RM };
			}

			function getExerciseStats(exerciseId) {
				const sessions = getExerciseSessions(exerciseId);
				const merged = sessions.flatMap((s) => s.sets || []);
				const stats = calcStatsFromSets(merged);
				return {
					bestWeight: fmt(stats.bestWeight),
					bestReps: fmt(stats.bestReps),
					bestE1RM: fmt(stats.bestE1RM)
				};
			}

			function compareWithLastSession(exerciseId, currentDate, currentSets) {
				const prev = getExerciseSessions(exerciseId).filter((s) => s.date < currentDate).slice(-1)[0];
				if (!prev) return null;
				const currentStats = calcStatsFromSets(currentSets || []);
				const prevStats = calcStatsFromSets(prev.sets || []);
				return {
					weightDelta: currentStats.bestWeight - prevStats.bestWeight,
					repDelta: currentStats.bestReps - prevStats.bestReps
				};
			}

			function renderInsight(cmp) {
				const w = cmp.weightDelta;
				const r = cmp.repDelta;
				const wTxt = w > 0 ? `<span class="ok">+${fmt(w)}kg</span>` : w < 0 ? `<span class="bad">${fmt(w)}kg</span>` : "0kg";
				const rTxt = r > 0 ? `<span class="ok">+${fmt(r)} reps</span>` : r < 0 ? `<span class="bad">${fmt(r)} reps</span>` : "0 reps";
				return `Vs last session: ${wTxt} • ${rTxt}`;
			}

			function getPlateauInsight(exerciseId) {
				const sessions = getExerciseSessions(exerciseId);
				const n = Math.max(3, Number(state.data.settings.plateauSessions) || 3);
				if (sessions.length < n + 1) return "";
				const recent = sessions.slice(-(n + 1)).map((s) => calcStatsFromSets(s.sets || []).bestE1RM);
				if (!recent.length) return "";
				const improved = recent[recent.length - 1] > recent[0] * 1.01;
				if (improved) return "";
				return `No improvement in ${n} sessions ⚠️ Try +1 rep, +2.5kg, or +1 set.`;
			}

			function buildWeeklyReport() {
				const nowRange = Object.values(state.data.workouts).filter((w) => w.date >= addDays(todayISO(), -6) && w.date <= todayISO());
				const exerciseIds = listAllExercises().map((e) => e.id);
				let strengthImprovements = 0;
				let plateauFlags = 0;
				exerciseIds.forEach((id) => {
					const sessions = getExerciseSessions(id);
					if (sessions.length >= 2) {
						const a = calcStatsFromSets(sessions[sessions.length - 1].sets || []).bestE1RM;
						const b = calcStatsFromSets(sessions[sessions.length - 2].sets || []).bestE1RM;
						if (a > b) strengthImprovements++;
					}
					if (getPlateauInsight(id)) plateauFlags++;
				});
				return {
					totalWorkouts: nowRange.length,
					strengthImprovements,
					plateauNote: `${plateauFlags} exercise${plateauFlags === 1 ? "" : "s"} flagged plateau`,
					weakAreas: plateauFlags ? "Review plateaued lifts" : "No obvious weak areas"
				};
			}

			function calcDisciplineStats() {
				let workouts30 = 0;
				let missedDays30 = 0;
				let trackedDays30 = 0;
				for (let i = 0; i < 30; i++) {
					const d = addDays(todayISO(), -i);
					const holiday = !!getHoliday(d);
					if (holiday) continue;
					trackedDays30++;
					if (state.data.workouts[d]) workouts30++;
					else if (d < todayISO()) missedDays30++;
				}
				return {
					streak: calcStreak(),
					missedDays30,
					consistency: trackedDays30 ? Math.round((workouts30 / trackedDays30) * 100) : 100
				};
			}

			function openWorkoutSummaryModal(workout) {
				const totalSets = (workout.exercises || []).reduce((n, ex) => n + (ex.sets || []).length, 0);
				let strongest = "-";
				let weakest = "-";
				let bestScore = -Infinity;
				let worstDelta = 0;
				const prs = [];

				(workout.exercises || []).forEach((ex) => {
					const stats = calcStatsFromSets(ex.sets || []);
					const score = stats.bestE1RM;
					if (score > bestScore) { bestScore = score; strongest = ex.name; }

					const cmp = compareWithLastSession(ex.exerciseId, state.selectedDate, ex.sets || []);
					if (cmp && (cmp.weightDelta + cmp.repDelta) < worstDelta) {
						worstDelta = (cmp.weightDelta + cmp.repDelta);
						weakest = `${ex.name} (${fmt(cmp.weightDelta)}kg, ${fmt(cmp.repDelta)} reps)`;
					}

					const hist = getHistoricalBestBeforeOrCurrent(ex.exerciseId, state.selectedDate);
					if (stats.bestWeight > hist.bestWeight) prs.push(`${ex.name}: Best weight ${fmt(stats.bestWeight)}kg`);
					if (stats.bestReps > hist.bestReps) prs.push(`${ex.name}: Best reps ${fmt(stats.bestReps)}`);
				});

				$("summaryBody").innerHTML = `
					<div class="session-line">
						<div class="small">Total sets: <strong>${totalSets}</strong></div>
						<div class="small">Strongest exercise: <strong>${escapeHtml(strongest)}</strong></div>
						<div class="small">Weakest performance: <strong>${escapeHtml(weakest)}</strong></div>
					</div>
					<div class="session-line">
						<h4 style="margin:0 0 6px;">PR Events</h4>
						${prs.length ? `<ul style="margin:0; padding-left:18px;">${prs.map((p) => `<li class="small">${escapeHtml(p)}</li>`).join("")}</ul>` : `<p class="small" style="margin:0;">No new PR today.</p>`}
					</div>
				`;
				$("summaryModal").classList.add("show");
			}

			function closeSummaryModal() {
				$("summaryModal").classList.remove("show");
			}

			function getHistoricalBestBeforeOrCurrent(exerciseId, currentDate) {
				const sessions = getExerciseSessions(exerciseId).filter((s) => s.date !== currentDate);
				return calcStatsFromSets(sessions.flatMap((s) => s.sets || []));
			}

			function drawAnalyticsChart() {
				const canvas = $("progressChart");
				const hint = $("chartHint");
				if (!canvas || !hint) return;
				const ctx = canvas.getContext("2d");
				const ratio = Math.max(1, window.devicePixelRatio || 1);
				const cssW = canvas.clientWidth;
				const cssH = canvas.clientHeight;
				canvas.width = Math.floor(cssW * ratio);
				canvas.height = Math.floor(cssH * ratio);
				ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
				ctx.clearRect(0, 0, cssW, cssH);

				const exId = state.analyticsExerciseId;
				const data = getExerciseSessions(exId).map((s) => {
					const vals = s.sets.map((x) => Number(x.weight)).filter((n) => Number.isFinite(n));
					const top = vals.length ? Math.max(...vals) : 0;
					return { x: s.date, y: top };
				}).filter((p) => p.y > 0);

				if (!data.length) {
					hint.textContent = "No chart data yet. Log weight for this exercise.";
					drawNoData(ctx, cssW, cssH);
					return;
				}

				const pad = { l: 36, r: 12, t: 18, b: 28 };
				const minY = Math.min(...data.map((d) => d.y));
				const maxY = Math.max(...data.map((d) => d.y));
				const yRange = Math.max(1, maxY - minY);
				const plotW = cssW - pad.l - pad.r;
				const plotH = cssH - pad.t - pad.b;

				ctx.strokeStyle = "#2a3f65";
				ctx.lineWidth = 1;
				ctx.beginPath();
				ctx.moveTo(pad.l, pad.t);
				ctx.lineTo(pad.l, cssH - pad.b);
				ctx.lineTo(cssW - pad.r, cssH - pad.b);
				ctx.stroke();

				const points = data.map((d, i) => {
					const x = pad.l + (plotW * (data.length === 1 ? 0.5 : i / (data.length - 1)));
					const y = pad.t + (plotH * (1 - ((d.y - minY) / yRange)));
					return { ...d, px: x, py: y };
				});

				ctx.strokeStyle = "#60a5fa";
				ctx.lineWidth = 2.4;
				ctx.beginPath();
				points.forEach((p, i) => {
					if (i === 0) ctx.moveTo(p.px, p.py);
					else ctx.lineTo(p.px, p.py);
				});
				ctx.stroke();

				points.forEach((p) => {
					ctx.fillStyle = "#5eead4";
					ctx.beginPath();
					ctx.arc(p.px, p.py, 3.4, 0, Math.PI * 2);
					ctx.fill();
				});

				ctx.fillStyle = "#9fb4d8";
				ctx.font = "12px Inter, system-ui, sans-serif";
				ctx.fillText(String(maxY), 4, pad.t + 2);
				ctx.fillText(String(minY), 4, cssH - pad.b);

				const first = data[0];
				const last = data[data.length - 1];
				const diff = (last.y - first.y).toFixed(1);
				const arrow = Number(diff) >= 0 ? "▲" : "▼";
				hint.textContent = `Top-set trend: ${first.y} → ${last.y} (${arrow} ${Math.abs(Number(diff))}) over ${data.length} session${data.length === 1 ? "" : "s"}.`;
			}

			function drawNoData(ctx, w, h) {
				ctx.fillStyle = "#213253";
				ctx.fillRect(0, 0, w, h);
				ctx.fillStyle = "#8fa7ce";
				ctx.font = "14px Inter, sans-serif";
				ctx.textAlign = "center";
				ctx.fillText("No Data", w / 2, h / 2);
				ctx.textAlign = "left";
			}

			function calcStreak() {
				const dates = Object.keys(state.data.workouts).sort();
				if (!dates.length) return 0;
				let streak = 0;
				let cursor = todayISO();
				while (state.data.workouts[cursor] || getHoliday(cursor)) {
					if (state.data.workouts[cursor]) streak++;
					cursor = addDays(cursor, -1);
				}
				return streak;
			}

			function exportData() {
				try {
					const payload = JSON.stringify(state.data, null, 2);
					const blob = new Blob([payload], { type: "application/json" });
					const a = document.createElement("a");
					a.href = URL.createObjectURL(blob);
					a.download = `workout-tracker-backup-${todayISO()}.json`;
					document.body.appendChild(a);
					a.click();
					a.remove();
					URL.revokeObjectURL(a.href);
					toast("Backup exported");
				} catch {
					toast("Export failed");
				}
			}

			function importData(e) {
				const file = e.target.files && e.target.files[0];
				if (!file) return;
				const reader = new FileReader();
				reader.onload = function () {
					try {
						const parsed = JSON.parse(String(reader.result || "{}"));
						if (!isValidImport(parsed)) throw new Error("Invalid backup format");
						ensureDataShape(parsed);
						state.data = parsed;
						autosave();
						state.selectedDate = todayISO();
						state.calendarCursor = monthStart(state.selectedDate);
						state.analyticsExerciseId = "";
						toast("Backup imported");
						render();
					} catch {
						toast("Invalid JSON backup");
					} finally {
						e.target.value = "";
					}
				};
				reader.readAsText(file);
			}

			function isValidImport(x) {
				if (!x || typeof x !== "object") return false;
				if (!Array.isArray(x.splits)) return false;
				if (!x.workouts || typeof x.workouts !== "object") return false;
				for (const s of x.splits) {
					if (!s || typeof s.name !== "string" || !Array.isArray(s.exercises)) return false;
					for (const e of s.exercises) {
						if (!e || typeof e.name !== "string") return false;
					}
				}
				for (const [d, w] of Object.entries(x.workouts)) {
					if (!/^\d{4}-\d{2}-\d{2}$/.test(d)) return false;
					if (!w || !Array.isArray(w.exercises)) return false;
					for (const ex of w.exercises) {
						if (!Array.isArray(ex.sets)) return false;
						for (const s of ex.sets) {
							if (typeof s !== "object") return false;
						}
					}
				}
				return true;
			}

			function toast(msg) {
				const t = $("toast");
				t.textContent = msg;
				t.classList.add("show");
				clearTimeout(toast._id);
				toast._id = setTimeout(() => t.classList.remove("show"), 1500);
			}

			function getHoliday(dateIso) {
				return (state.data.settings.holidays || []).find((h) => h.date === dateIso) || null;
			}

			function formatDuration(totalSec) {
				const s = Math.max(0, Number(totalSec) || 0);
				const h = Math.floor(s / 3600);
				const m = Math.floor((s % 3600) / 60);
				const sec = s % 60;
				if (h > 0) return `${String(h).padStart(2, "0")}:${String(m).padStart(2, "0")}:${String(sec).padStart(2, "0")}`;
				return `${String(m).padStart(2, "0")}:${String(sec).padStart(2, "0")}`;
			}

			function $(id) { return document.getElementById(id); }
			function makeEmptyStrengthSet(mode) {
				if (mode === "drop") return { topWeight: "", topReps: "", dropWeight: "", dropReps: "" };
				if (mode === "superset") return { aWeight: "", aReps: "", bWeight: "", bReps: "" };
				return { weight: "", reps: "", bodyweight: false };
			}
			function normalizeStrengthSetByMode(set, mode) {
				const s = set || {};
				if (mode === "drop") {
					return {
						topWeight: normalizeNum(s.topWeight ?? s.weight),
						topReps: normalizeNum(s.topReps ?? s.reps),
						dropWeight: normalizeNum(s.dropWeight),
						dropReps: normalizeNum(s.dropReps)
					};
				}
				if (mode === "superset") {
					return {
						aWeight: normalizeNum(s.aWeight ?? s.weight),
						aReps: normalizeNum(s.aReps ?? s.reps),
						bWeight: normalizeNum(s.bWeight),
						bReps: normalizeNum(s.bReps)
					};
				}
				return {
					weight: normalizeNum(s.weight ?? s.topWeight ?? s.aWeight),
					reps: normalizeNum(s.reps ?? s.topReps ?? s.aReps),
					bodyweight: !!s.bodyweight,
					bodyweightWeight: normalizeNum(s.bodyweightWeight)
				};
			}
			function hasAnyLoggedStrengthValue(set, mode) {
				if (mode === "drop") {
					return normalizeNum(set.topWeight) !== "" || normalizeNum(set.topReps) !== "" || normalizeNum(set.dropWeight) !== "" || normalizeNum(set.dropReps) !== "";
				}
				if (mode === "superset") {
					return normalizeNum(set.aWeight) !== "" || normalizeNum(set.aReps) !== "" || normalizeNum(set.bWeight) !== "" || normalizeNum(set.bReps) !== "";
				}
				if (set.bodyweight) return normalizeNum(set.reps) !== "" || normalizeNum(set.bodyweightWeight) !== "";
				return normalizeNum(set.weight) !== "" || normalizeNum(set.reps) !== "";
			}
			function getStrengthPairsFromSet(set) {
				if (!set || typeof set !== "object") return [];
				if (set.bodyweight) {
					return normalizeNum(set.reps) !== "" ? [{ weight: set.bodyweightWeight ?? 0, reps: set.reps }] : [];
				}
				if ("topWeight" in set || "dropWeight" in set) {
					return [
						{ weight: set.topWeight, reps: set.topReps },
						{ weight: set.dropWeight, reps: set.dropReps }
					];
				}
				if ("aWeight" in set || "bWeight" in set) {
					return [
						{ weight: set.aWeight, reps: set.aReps },
						{ weight: set.bWeight, reps: set.bReps }
					];
				}
				return [{ weight: set.weight, reps: set.reps }];
			}
			function formatSetForDisplay(set, type, mode) {
				if (type === "cardio") {
					return `${formatDuration(Number(set.durationSec) || 0)}${safeNum(set.distanceKm) ? ` • ${safeNum(set.distanceKm)} km` : ""}`;
				}
				if (mode === "drop") {
					const top = `${safeNum(set.topWeight)}x${safeNum(set.topReps)}`;
					const drop = `${safeNum(set.dropWeight)}x${safeNum(set.dropReps)}`;
					return `Top ${top}${drop !== "x" ? ` -> Drop ${drop}` : ""}`;
				}
				if (mode === "superset") {
					const a = `${safeNum(set.aWeight)}x${safeNum(set.aReps)}`;
					const b = `${safeNum(set.bWeight)}x${safeNum(set.bReps)}`;
					return `A ${a}${b !== "x" ? ` + B ${b}` : ""}`;
				}
				if (set.bodyweight) {
					return `BW ${safeNum(set.bodyweightWeight)}x${safeNum(set.reps)}`;
				}
				return `${safeNum(set.weight)}x${safeNum(set.reps)}`;
			}
			function uid(prefix) { return prefix + "_" + Math.random().toString(36).slice(2, 9); }
			function normalizeNum(v) {
				if (v === null || v === undefined) return "";
				const str = String(v).trim();
				if (!str) return "";
				const n = Number(str);
				return Number.isFinite(n) ? n : "";
			}
			function fmt(n) {
				const x = Number(n);
				if (!Number.isFinite(x)) return "0";
				return Math.abs(x % 1) < 1e-9 ? String(x) : x.toFixed(1);
			}
			function safeNum(v) { return v === 0 || v ? String(v) : ""; }
			function todayISO() { return toISO(new Date()); }
			function toISO(d) {
				const y = d.getFullYear();
				const m = String(d.getMonth() + 1).padStart(2, "0");
				const day = String(d.getDate()).padStart(2, "0");
				return `${y}-${m}-${day}`;
			}
			function addDays(iso, n) {
				const d = new Date(iso + "T00:00:00");
				d.setDate(d.getDate() + n);
				return toISO(d);
			}
			function monthStart(iso) {
				const d = new Date(iso + "T00:00:00");
				d.setDate(1);
				return toISO(d);
			}
			function fmtDisplayDate(iso) {
				const d = new Date(iso + "T00:00:00");
				return d.toLocaleDateString(undefined, { weekday: "short", month: "short", day: "numeric", year: "numeric" });
			}
			function escapeHtml(s) {
				return String(s)
					.replaceAll("&", "&amp;")
					.replaceAll("<", "&lt;")
					.replaceAll(">", "&gt;")
					.replaceAll('"', "&quot;")
					.replaceAll("'", "&#39;");
			}
		})();
	</script>
