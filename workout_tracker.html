<!doctype html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
	<title>Workout Tracker</title>
	<style>
		@import url("https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&family=Sora:wght@600;700;800&display=swap");

		:root {
			--bg: #0b0f16;
			--bg-2: #101826;
			--card: #111b2b;
			--muted: #8b9ab3;
			--text: #e8eefc;
			--accent: #5eead4;
			--accent-2: #60a5fa;
			--danger: #fb7185;
			--success: #4ade80;
			--warning: #fbbf24;
			--border: #22314c;
			--shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
			--radius: 18px;
			--tap: 46px;
		}

		* { box-sizing: border-box; }

		html, body {
			margin: 0;
			padding: 0;
			background: linear-gradient(180deg, var(--bg), #0a1322 50%, var(--bg));
			color: var(--text);
			font-family: Manrope, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
			min-height: 100%;
		}

		body {
			max-width: 100%;
			overflow-x: hidden;
		}

		.app {
			width: min(980px, 100%);
			margin: 0 auto;
			padding: 18px 14px 92px;
		}

		.topbar {
			display: flex;
			align-items: center;
			justify-content: space-between;
			gap: 10px;
			margin-bottom: 14px;
		}

		.title {
			font-size: 1.2rem;
			font-weight: 800;
			letter-spacing: 0.2px;
			margin: 0;
			font-family: Sora, Manrope, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
		}

		.sub {
			margin: 2px 0 0;
			color: var(--muted);
			font-size: 0.86rem;
		}

		.btn, button, select, input, textarea {
			font: inherit;
		}

		.btn {
			border: 1px solid var(--border);
			background: #0e1728;
			color: var(--text);
			border-radius: 12px;
			min-height: var(--tap);
			padding: 0 14px;
			cursor: pointer;
			transition: transform .12s ease, background .2s ease, border .2s ease;
			display: inline-flex;
			align-items: center;
			justify-content: center;
			gap: 8px;
			user-select: none;
			-webkit-tap-highlight-color: transparent;
			font-weight: 700;
		}

		.btn:active { transform: scale(0.98); }
		.btn.primary { background: linear-gradient(135deg, #1d4ed8, #2563eb); border-color: #3b82f6; }
		.btn.accent { background: linear-gradient(135deg, #0891b2, #0ea5e9); border-color: #22d3ee; }
		.btn.success { background: linear-gradient(135deg, #15803d, #16a34a); border-color: #4ade80; }
		.btn.warn { background: #3a2a0a; border-color: #7c5a12; color: #fed7aa; }
		.btn.ghost { background: transparent; }
		.btn.danger { background: #2a1218; border-color: #7f1d2d; color: #fecdd3; }

		.tabs {
			position: fixed;
			top: 0;
			left: 0;
			right: 0;
			bottom: auto;
			background: rgba(12, 18, 31, .92);
			backdrop-filter: blur(10px);
			border-top: none;
			border-bottom: 1px solid var(--border);
			display: grid;
			grid-template-columns: repeat(5, 1fr);
			padding: 8px;
			z-index: 50;
		}

		.tab {
			min-height: 54px;
			border-radius: 14px;
			border: none;
			background: transparent;
			color: #aac0e5;
			font-weight: 600;
			font-size: .78rem;
		}

		.tab.active {
			background: #14223a;
			color: #e0ebff;
		}

		.screen { display: none; animation: fade .24s ease; }
		.screen.active { display: block; }
		@keyframes fade { from { opacity: .35; transform: translateY(4px);} to { opacity: 1; transform: translateY(0);} }

		.card {
			background: linear-gradient(180deg, #111c2e, #101a2a);
			border: 1px solid var(--border);
			border-radius: var(--radius);
			box-shadow: var(--shadow);
			padding: 14px;
			margin-bottom: 12px;
		}

		.card h3 {
			font-family: Sora, Manrope, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
			letter-spacing: 0.2px;
		}

		.section-kicker {
			font-family: Sora, Manrope, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
			font-size: 0.78rem;
			font-weight: 800;
			letter-spacing: 0.08em;
			text-transform: uppercase;
			color: #cfe1ff;
			margin: 2px 0 8px;
			opacity: 0.95;
		}

		.row { display: flex; gap: 10px; align-items: center; }
		.row.wrap { flex-wrap: wrap; }
		.grow { flex: 1; }
		.right { margin-left: auto; }

		.input, select, textarea {
			width: 100%;
			border-radius: 12px;
			border: 1px solid var(--border);
			background: #0d1728;
			color: var(--text);
			padding: 0 12px;
			min-height: var(--tap);
			outline: none;
		}

		textarea.input {
			min-height: 84px;
			padding: 10px 12px;
			resize: vertical;
		}

		.small { font-size: .84rem; color: var(--muted); }
		.tiny { font-size: .75rem; color: var(--muted); }
		.pill {
			background: #0b2233;
			border: 1px solid #1f4b66;
			color: #a8daff;
			padding: 5px 10px;
			border-radius: 999px;
			font-size: .75rem;
			font-weight: 700;
		}

		.exercise-card {
			border: 1px solid #213557;
			border-radius: 14px;
			background: #0f1b2f;
			padding: 10px;
			margin-top: 10px;
		}

		.exercise-header {
			display: flex;
			align-items: center;
			justify-content: space-between;
			gap: 8px;
			margin-bottom: 8px;
		}

		.exercise-name {
			font-weight: 700;
			margin: 0;
			cursor: pointer;
			padding: 8px 10px;
			border-radius: 10px;
			background: #0b1526;
			border: 1px solid #1d2d4a;
			flex: 1;
		}

		.exercise-name:hover { background: #12203a; }

		.set-row {
			display: grid;
			grid-template-columns: 58px 1fr 1fr 42px;
			gap: 8px;
			align-items: center;
			margin-top: 8px;
		}

		.set-index {
			text-align: center;
			font-weight: 700;
			color: #b7c9ea;
			background: #10213d;
			border: 1px solid #29456e;
			border-radius: 10px;
			min-height: 42px;
			display: grid;
			place-items: center;
		}

		.set-row .input {
			min-height: 42px;
			text-align: center;
			padding: 0 8px;
		}

		.icon-btn {
			min-height: 42px;
			width: 42px;
			border-radius: 10px;
			border: 1px solid #4a2430;
			background: #29131b;
			color: #ffc0cc;
			cursor: pointer;
		}

		.grid-2 {
			display: grid;
			grid-template-columns: 1fr;
			gap: 10px;
		}

		.metrics {
			display: grid;
			grid-template-columns: repeat(2, 1fr);
			gap: 8px;
		}

		.metric {
			background: #0d1728;
			border: 1px solid var(--border);
			border-radius: 12px;
			padding: 10px;
			text-align: center;
		}

		.metric h4 {
			margin: 0;
			font-size: 1.2rem;
		}

		.metric p {
			margin: 4px 0 0;
			color: var(--muted);
			font-size: .78rem;
		}

		.calendar-head {
			display: grid;
			grid-template-columns: repeat(7, 1fr);
			gap: 6px;
			margin-top: 10px;
			margin-bottom: 6px;
		}

		.calendar-head div {
			text-align: center;
			color: #9cb1d4;
			font-size: .74rem;
			font-weight: 700;
		}

		.calendar-grid {
			display: grid;
			grid-template-columns: repeat(7, 1fr);
			gap: 6px;
		}

		.day {
			min-height: 52px;
			border-radius: 12px;
			border: 1px solid #22324f;
			background: #0d1626;
			color: #d5e3ff;
			cursor: pointer;
			font-weight: 700;
			position: relative;
		}

		.day.other { opacity: .4; }
		.day.today { outline: 2px solid #2563eb; }
		.day.worked { background: #0f2a1b; border-color: #266f47; color: #bdf7d1; }
		.day.missed::after {
			content: "";
			width: 7px;
			height: 7px;
			border-radius: 50%;
			background: #f59e0b;
			position: absolute;
			right: 6px;
			bottom: 6px;
		}

		.split-item {
			border: 1px solid #243654;
			border-radius: 12px;
			background: #0f1a2d;
			padding: 10px;
			margin-top: 10px;
		}

		.split-ex {
			display: grid;
			grid-template-columns: 1fr 120px auto auto auto;
			align-items: center;
			gap: 6px;
			margin-top: 8px;
		}

		.chart-wrap {
			border: 1px solid #243858;
			border-radius: 14px;
			background: #0d1728;
			padding: 10px;
			overflow: hidden;
		}

		canvas { width: 100%; height: 220px; display: block; }

		.modal {
			position: fixed;
			inset: 0;
			background: rgba(0, 0, 0, .55);
			display: none;
			align-items: flex-end;
			z-index: 50;
		}

		.modal.show { display: flex; }

		.modal-sheet {
			width: 100%;
			max-height: 78vh;
			overflow: auto;
			background: #0f1b2f;
			border: 1px solid #2b3f64;
			border-bottom: none;
			border-radius: 18px 18px 0 0;
			padding: 14px;
		}

		.session-line {
			margin-top: 8px;
			border: 1px solid #27395a;
			background: #0c1629;
			border-radius: 10px;
			padding: 8px;
		}

		.insight {
			margin-top: 6px;
			font-size: .76rem;
			color: #9fb1cf;
		}

		.plateau-pill {
			margin-top: 7px;
			padding: 6px 8px;
			border-radius: 9px;
			border: 1px solid #8a6113;
			background: #3b2a0d;
			color: #ffd695;
			font-size: .75rem;
			font-weight: 600;
		}

		.ok { color: #78e7a0; }
		.bad { color: #f8b4c2; }

		.muscle-row {
			display: grid;
			grid-template-columns: 92px 1fr;
			gap: 8px;
			align-items: center;
			margin-top: 8px;
		}

		.progress-bar {
			height: 10px;
			border-radius: 999px;
			border: 1px solid #2a3a57;
			background: #0b1324;
			overflow: hidden;
		}

		.progress-bar > span {
			display: block;
			height: 100%;
			background: linear-gradient(90deg, #1d4ed8, #06b6d4);
		}

		.toast {
			position: fixed;
			left: 50%;
			transform: translateX(-50%);
			bottom: 76px;
			background: #0c1628;
			border: 1px solid #294061;
			color: #d7e6ff;
			border-radius: 12px;
			padding: 10px 14px;
			font-size: .86rem;
			opacity: 0;
			pointer-events: none;
			transition: opacity .2s ease, transform .2s ease;
			z-index: 60;
		}

		.toast.show {
			opacity: 1;
			transform: translateX(-50%) translateY(-4px);
		}

		@media (min-width: 780px) {
			.app { padding: 22px 20px 24px; }
			.tabs {
				position: static;
				border: 1px solid var(--border);
				border-radius: 16px;
				width: fit-content;
				margin: 0 0 16px auto;
			}
			.grid-2 { grid-template-columns: 1fr 1fr; }
			.metrics { grid-template-columns: repeat(4, 1fr); }
			.modal { align-items: center; justify-content: center; }
			.modal-sheet { width: min(620px, 94vw); border-radius: 18px; border-bottom: 1px solid #2b3f64; }
		}

		/* --- V2 visual refresh (overrides) --- */
		:root {
			--bg: #071812;
			--bg-2: #0c221a;
			--card: #10281e;
			--muted: #9bc1b1;
			--text: #e7fff5;
			--accent: #34d399;
			--accent-2: #2dd4bf;
			--border: #24503f;
			--shadow: 0 8px 24px rgba(1, 12, 8, 0.35);
		}

		body::before,
		body::after {
			display: none;
		}

		.app {
			padding-top: 16px;
		}

		.topbar {
			position: sticky;
			top: 0;
			z-index: 15;
			padding: 8px 0 10px;
			backdrop-filter: blur(8px);
		}

		.title {
			font-size: 1.28rem;
			color: var(--text);
		}

		.card,
		.split-item,
		.exercise-card,
		.modal-sheet,
		.chart-wrap,
		.metric {
			background: var(--card);
			border: 1px solid var(--border);
		}

		.card {
			border-radius: 16px;
			padding: 15px;
		}

		.btn {
			border-radius: 12px;
			border-color: var(--border);
			background: #123224;
		}

		.btn:hover { border-color: #2f6c55; }
		.btn.primary { background: #0f766e; border-color: #14b8a6; }
		.btn.accent { background: #15803d; border-color: #34d399; }
		.btn.success { background: #166534; border-color: #4ade80; }

		.input,
		select,
		textarea {
			border-radius: 12px;
			background: #0d2119;
			border-color: #2c5b49;
		}

		.input:focus,
		select:focus,
		textarea:focus {
			border-color: #60a5fa;
			box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
		}

		.tabs {
			left: 10px;
			right: 10px;
			bottom: 10px;
			border-radius: 14px;
			border: 1px solid var(--border);
			background: rgba(8, 24, 18, 0.95);
			box-shadow: 0 8px 20px rgba(1, 12, 8, 0.35);
		}

		.tab {
			display: grid;
			place-items: center;
			line-height: 1;
			font-size: 0.76rem;
		}

		.tab.active {
			background: #143829;
			border: 1px solid #2b6a52;
		}

		.exercise-name {
			border-radius: 10px;
			background: #0f261c;
		}

		.set-index {
			background: #123326;
			border-color: #2f7358;
		}

		.icon-btn {
			background: #2a1519;
			border-color: #7a2e40;
		}

		.pill {
			background: #103426;
			border-color: #2f7157;
		}

		.day {
			border-radius: 12px;
			background: #10291f;
		}

		.day.worked {
			background: #145233;
			border-color: #2ea76e;
		}

		.day.holiday {
			background: #2b2a14;
			border-color: #8f7d31;
			color: #f7e9a8;
		}

		.cardio-box {
			margin-top: 10px;
			border: 1px solid #2a3c5a;
			border-radius: 12px;
			background: #0d172b;
			padding: 10px;
		}

		.toast {
			bottom: 88px;
			border-radius: 12px;
			background: #113224;
		}

		@media (min-width: 780px) {
			.tabs {
				left: auto;
				right: auto;
				bottom: auto;
				margin: 0 0 18px auto;
			}
		}

		/* --- UX polish v3 (style-only) --- */
		:root {
			--radius-lg: 18px;
			--radius-md: 12px;
		}

		html {
			scroll-behavior: smooth;
		}

		.topbar {
			background: linear-gradient(180deg, rgba(7, 24, 18, 0.92), rgba(7, 24, 18, 0.72));
			border-bottom: 1px solid rgba(74, 131, 106, 0.28);
		}

		.card,
		.split-item,
		.exercise-card,
		.metric,
		.modal-sheet,
		.chart-wrap {
			border-radius: var(--radius-lg);
			box-shadow: 0 8px 20px rgba(2, 6, 23, 0.26);
		}

		.card:hover,
		.split-item:hover,
		.exercise-card:hover {
			border-color: #2f7d5f;
		}

		.btn {
			font-weight: 650;
			letter-spacing: 0.15px;
		}

		.btn:focus-visible,
		.day:focus-visible,
		.exercise-name:focus-visible,
		.icon-btn:focus-visible,
		.tab:focus-visible,
		.input:focus-visible,
		select:focus-visible,
		textarea:focus-visible {
			outline: 2px solid #60a5fa;
			outline-offset: 2px;
		}

		.exercise-header {
			margin-bottom: 10px;
		}

		.exercise-name {
			transition: background 0.18s ease, border-color 0.18s ease;
		}

		/* Works for both strength and cardio rows */
		.set-row {
			grid-template-columns: 58px minmax(0, 1fr) minmax(0, 1fr) auto auto;
			gap: 7px;
		}

		.set-row.wide {
			grid-template-columns: 58px minmax(0, 1fr) minmax(0, 1fr) minmax(0, 1fr) minmax(0, 1fr) auto;
		}

		.set-row .icon-btn {
			width: 38px;
			min-height: 38px;
		}

		.calendar-grid .day {
			transition: transform .1s ease, border-color .15s ease, background .15s ease;
		}

		.calendar-grid .day:active {
			transform: scale(0.98);
		}

		.split-ex {
			gap: 8px;
		}

		@media (max-width: 779px) {
			.app {
				padding-inline: 12px;
			}

			.title {
				font-size: 1.18rem;
			}

			.metric h4 {
				font-size: 1.1rem;
			}

			.split-ex {
				grid-template-columns: 1fr 104px auto auto auto;
			}

			.set-row {
				grid-template-columns: 52px minmax(0, 1fr) minmax(0, 1fr) auto;
			}

			.set-row .icon-btn {
				width: 36px;
				min-height: 36px;
			}

			.tabs {
				padding: 7px;
			}
		}

		/* --- Fun unique theme v4 (style-only) --- */
		:root {
			--bg: #140a24;
			--bg-2: #1f1036;
			--card: #231347;
			--text: #f3ecff;
			--muted: #bca8e6;
			--accent: #ff5bd1;
			--accent-2: #5ef2ff;
			--border: #5a3fa1;
		}

		html, body {
			background:
				radial-gradient(1200px 600px at 10% -20%, rgba(255, 91, 209, 0.18), transparent 60%),
				radial-gradient(1000px 500px at 100% 0%, rgba(94, 242, 255, 0.16), transparent 58%),
				linear-gradient(180deg, #12081f, #1a0f2e 50%, #12081f);
		}

		.topbar {
			background: linear-gradient(180deg, rgba(20, 10, 36, 0.9), rgba(20, 10, 36, 0.65));
			border-bottom: 1px solid rgba(148, 112, 230, 0.35);
		}

		.card,
		.split-item,
		.exercise-card,
		.metric,
		.chart-wrap,
		.modal-sheet {
			background: linear-gradient(180deg, rgba(42, 22, 78, 0.88), rgba(28, 15, 54, 0.88));
			border-color: #6046a8;
			box-shadow:
				0 10px 28px rgba(10, 5, 20, 0.42),
				inset 0 1px 0 rgba(255, 255, 255, 0.06);
		}

		.card:hover,
		.split-item:hover,
		.exercise-card:hover {
			border-color: #7d62d2;
		}

		.title {
			background: linear-gradient(90deg, #fff 0%, #ffd8f6 38%, #c6f8ff 75%, #fff 100%);
			-webkit-background-clip: text;
			background-clip: text;
			color: transparent;
		}

		.btn {
			background: linear-gradient(180deg, #35205f, #2b174f);
			border-color: #6b50b8;
			color: #f7f0ff;
		}

		.btn.primary {
			background: linear-gradient(135deg, #6d28d9, #ec4899);
			border-color: #f472b6;
		}

		.btn.accent {
			background: linear-gradient(135deg, #0891b2, #7c3aed);
			border-color: #67e8f9;
		}

		.btn.success {
			background: linear-gradient(135deg, #9333ea, #22c55e);
			border-color: #86efac;
		}

		.input,
		select,
		textarea {
			background: #1a1033;
			border-color: #5f49a0;
			color: #f7efff;
		}

		.input:focus,
		select:focus,
		textarea:focus,
		.btn:focus-visible,
		.day:focus-visible,
		.tab:focus-visible,
		.icon-btn:focus-visible,

			padding: var(--space-1);
		}

		.split-ex {
			margin-top: var(--space-1);
			padding: var(--space-1);
		}

		@media (max-width: 779px) {
			.card,
			.card.card-session,
			.card.card-exercises,
			.card.card-notes,
			.card.card-planner,
			.card.card-splits-list {
				padding: var(--space-2);
			}

			.exercise-card,
			.split-item {
				padding: var(--space-2);
			}
		}

		/* Final nav lock: keep tab bar pinned on top on all devices */
		.app > .tabs {
			position: fixed !important;
			top: 0 !important;
			left: 0 !important;
			right: 0 !important;
			bottom: auto !important;
			width: 100% !important;
			margin: 0 !important;
			z-index: 1000 !important;
			border-top: none !important;
			border-bottom: 1px solid var(--border) !important;
		}

		@supports (top: env(safe-area-inset-top)) {
			.app > .tabs {
				top: env(safe-area-inset-top) !important;
			}

			.app {
				padding-top: calc(96px + env(safe-area-inset-top));
			}

			.topbar {
				top: calc(76px + env(safe-area-inset-top));
			}
		}

	</style>
</head>
<body>
	<div class="app" id="app"></div>
	<div class="toast" id="toast"></div>

	<div class="modal" id="historyModal" aria-hidden="true">
		<div class="modal-sheet">
			<div class="row">
				<h3 id="modalTitle" style="margin:0;">Exercise History</h3>
				<button class="btn ghost right" id="closeModal">Close</button>
			</div>
			<p class="small" id="lastWeekExact"></p>
			<div id="historyList"></div>
		</div>
	</div>

	<div class="modal" id="summaryModal" aria-hidden="true">
		<div class="modal-sheet">
			<div class="row">
				<h3 style="margin:0;">Workout Summary</h3>
				<button class="btn ghost right" id="closeSummaryModal">Close</button>
			</div>
			<div id="summaryBody"></div>
		</div>
	</div>

	<script>
		(function () {
			"use strict";

			const STORAGE_KEY = "workoutTracker_v1";
			const DAYS = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];
			const WEEK_DAYS = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
			const EXERCISE_TYPES = ["strength", "cardio"];

			const state = {
				view: "today",
				selectedDate: todayISO(),
				calendarCursor: monthStart(todayISO()),
				analyticsExerciseId: "",
				selectedExerciseHistory: null,
				data: loadData()
			};

			ensureDataShape(state.data);
			autosave();
			render();

			function loadData() {
				try {
					const raw = localStorage.getItem(STORAGE_KEY);
					if (!raw) return defaultData();
					const parsed = JSON.parse(raw);
					if (!parsed || typeof parsed !== "object") return defaultData();
					return parsed;
				} catch {
					return defaultData();
				}
			}

			function defaultData() {
				const push = mkSplit("Push", [
					{ name: "Bench Press", type: "strength" },
					{ name: "Incline Dumbbell Press", type: "strength" },
					{ name: "Shoulder Press", type: "strength" }
				]);
				const pull = mkSplit("Pull", [
					{ name: "Barbell Row", type: "strength" },
					{ name: "Lat Pulldown", type: "strength" },
					{ name: "Bicep Curl", type: "strength" }
				]);
				const legs = mkSplit("Legs", [
					{ name: "Squat", type: "strength" },
					{ name: "Leg Press", type: "strength" },
					{ name: "Romanian Deadlift", type: "strength" }
				]);
				const cardio = mkSplit("Cardio Day", [
					{ name: "Treadmill", type: "cardio" },
					{ name: "Outdoor Walk", type: "cardio" }
				]);
				const weekSchedule = ["", push.id, pull.id, legs.id, push.id, pull.id, cardio.id];
				return {
					version: 1,
					createdAt: new Date().toISOString(),
					settings: { showMissedDays: true, plateauSessions: 3, holidays: [], weekSchedule, weekOverrides: {} },
					splits: [push, pull, legs, cardio],
					workouts: {}
				};
			}

			function mkSplit(name, ex) {
				return {
					id: uid("sp"),
					name,
					exercises: ex.map((e) => {
						if (typeof e === "string") return { id: uid("ex"), name: e, type: "strength" };
						return { id: uid("ex"), name: e.name, type: EXERCISE_TYPES.includes(e.type) ? e.type : "strength" };
					})
				};
			}

			function ensureDataShape(data) {
				if (!data.settings) data.settings = { showMissedDays: true, plateauSessions: 3, holidays: [], weekSchedule: ["", "", "", "", "", "", ""], weekOverrides: {} };
				if (typeof data.settings.showMissedDays !== "boolean") data.settings.showMissedDays = true;
				if (!Number.isFinite(Number(data.settings.plateauSessions))) data.settings.plateauSessions = 3;
				if (!Array.isArray(data.settings.holidays)) data.settings.holidays = [];
				if (!Array.isArray(data.settings.weekSchedule)) data.settings.weekSchedule = ["", "", "", "", "", "", ""];
				if (!data.settings.weekOverrides || typeof data.settings.weekOverrides !== "object" || Array.isArray(data.settings.weekOverrides)) data.settings.weekOverrides = {};
				while (data.settings.weekSchedule.length < 7) data.settings.weekSchedule.push("");
				if (data.settings.weekSchedule.length > 7) data.settings.weekSchedule = data.settings.weekSchedule.slice(0, 7);
				data.settings.weekSchedule = data.settings.weekSchedule.map((id) => (typeof id === "string" ? id : ""));
				data.settings.holidays = data.settings.holidays
					.filter((h) => h && /^\d{4}-\d{2}-\d{2}$/.test(h.date || ""))
					.map((h) => ({ date: h.date, name: String(h.name || "Holiday") }));
				if (!Array.isArray(data.splits)) data.splits = [];
				if (!data.workouts || typeof data.workouts !== "object") data.workouts = {};
				data.splits.forEach((s) => {
					if (!s.id) s.id = uid("sp");
					if (!Array.isArray(s.exercises)) s.exercises = [];
					s.exercises.forEach((e) => {
						if (!e.id) e.id = uid("ex");
						if (!EXERCISE_TYPES.includes(e.type)) e.type = "strength";
					});
				});
				const validSplitIds = new Set(data.splits.map((s) => s.id));
				data.settings.weekSchedule = data.settings.weekSchedule.map((id) => (validSplitIds.has(id) ? id : ""));
				Object.entries(data.settings.weekOverrides).forEach(([weekStart, row]) => {
					if (!/^\d{4}-\d{2}-\d{2}$/.test(weekStart)) {
						delete data.settings.weekOverrides[weekStart];
						return;
					}
					if (!row || !Array.isArray(row.schedule)) {
						delete data.settings.weekOverrides[weekStart];
						return;
					}
					const cleanSchedule = row.schedule.slice(0, 7);
					while (cleanSchedule.length < 7) cleanSchedule.push("");
					data.settings.weekOverrides[weekStart] = {
						schedule: cleanSchedule.map((id) => (validSplitIds.has(id) ? id : "")),
						createdAt: typeof row.createdAt === "string" ? row.createdAt : new Date().toISOString()
					};
				});
				Object.values(data.workouts).forEach((w) => {
					if (!Array.isArray(w.exercises)) w.exercises = [];
					if (typeof w.notes !== "string") w.notes = "";
					w.exercises.forEach((e) => {
						if (!EXERCISE_TYPES.includes(e.type)) e.type = "strength";
						if (!["normal", "drop", "superset"].includes(e.intensityMode)) e.intensityMode = "normal";
						if (typeof e.supersetWith !== "string") e.supersetWith = "";
						if (typeof e.dropSetNote !== "string") e.dropSetNote = "";
						if (!Array.isArray(e.sets)) e.sets = [];
						e.sets = e.type === "cardio"
							? e.sets.map((s) => ({ durationSec: Number(s.durationSec) || 0, distanceKm: normalizeNum(s.distanceKm) }))
							: e.sets.map((s) => normalizeStrengthSetByMode(s, e.intensityMode));
					});
				});
			}

			function autosave() {
				localStorage.setItem(STORAGE_KEY, JSON.stringify(state.data));
			}

			function render() {
				const app = $("app");
				app.innerHTML = `
					<div class="topbar">
						<div>
							<h1 class="title">Workout Tracker</h1>
							<p class="sub">${fmtDisplayDate(state.selectedDate)} • Streak ${calcStreak()} day${calcStreak() === 1 ? "" : "s"}</p>
						</div>
						<button class="btn accent" id="quickSaveBtn">Save</button>
					</div>

					${renderTabs()}

					<section class="screen ${state.view === "today" ? "active" : ""}" id="screen-today">${renderToday()}</section>
					<section class="screen ${state.view === "splits" ? "active" : ""}" id="screen-splits">${renderSplits()}</section>
					<section class="screen ${state.view === "calendar" ? "active" : ""}" id="screen-calendar">${renderCalendar()}</section>
					<section class="screen ${state.view === "analytics" ? "active" : ""}" id="screen-analytics">${renderAnalytics()}</section>
					<section class="screen ${state.view === "settings" ? "active" : ""}" id="screen-settings">${renderSettings()}</section>
				`;

				bindGlobalEvents();
				if (state.view === "analytics") drawAnalyticsChart();
			}

			function renderTabs() {
				const tabs = [
					["today", "Today"],
					["splits", "Splits"],
					["calendar", "Calendar"],
					["analytics", "Analytics"],
					["settings", "Data"]
				];

				return `<nav class="tabs">${tabs.map(([id, label]) => `<button class="tab ${state.view === id ? "active" : ""}" data-tab="${id}"><span class="lbl">${label}</span></button>`).join("")}</nav>`;
			}

			function renderToday() {
				const splitOptions = state.data.splits.map((s) => `<option value="${s.id}">${escapeHtml(s.name)}</option>`).join("");
				const holiday = getHoliday(state.selectedDate);
				const weekOverride = getWeekOverrideForDate(state.selectedDate);
				const weekStart = getWeekStartISO(state.selectedDate);
				const weekEnd = addDays(weekStart, 6);
				const workout = getWorkoutOrDefault(state.selectedDate);
				const split = getSplitById(workout.splitId) || state.data.splits[0] || null;
				if (state.data.workouts[state.selectedDate] && split) ensureSelectedWorkoutMatchesSplit(state.selectedDate);
				if (split && workout.exercises.length === 0) syncWorkoutExercisesToSplit(workout, split);

				return `
					${holiday ? `<div class="section-kicker">Status</div><div class="card card-busy-override"><p class="small" style="margin:0;"><strong>${escapeHtml(holiday.name)}</strong> is marked as a holiday.</p></div>` : ""}
					${weekOverride ? `<div class="section-kicker">Status</div><div class="card card-busy-override"><p class="small" style="margin:0 0 10px;"><strong>Temporary week shift is active</strong> (${weekStart} to ${weekEnd}). This only affects this week; next week uses your normal planner.</p><button class="btn ghost" id="clearWeekShiftBtn">Revert This Week Shift</button></div>` : ""}
					<div class="section-kicker">Session Setup</div>
					<div class="card card-session">
						<div class="row wrap">
							<input class="input grow" type="date" id="workoutDate" value="${state.selectedDate}" />
							<select id="splitSelect" class="grow input">${splitOptions}</select>
							<button class="btn primary" id="applySplitBtn">Use Split</button>
							<button class="btn warn" id="busyShiftWeekBtn">Busy Day → Shift Week</button>
						</div>
						<p class="small" style="margin:8px 0 0;">Tap exercise name to view exact last week sets and recent history.</p>
					</div>

					<div class="section-kicker">Workout Log</div>
					<div class="card card-exercises">
						<div class="row">
							<h3 style="margin:0;">Exercises</h3>
							<span class="pill right">${workout.exercises.length} exercise${workout.exercises.length === 1 ? "" : "s"}</span>
						</div>
						<div id="exerciseList">${renderWorkoutExercises(workout)}</div>
						<div class="row wrap" style="margin-top:10px;">
							<button class="btn success" id="saveWorkoutBtn">Save Workout</button>
							<button class="btn accent" id="autofillLastWeekBtn">Auto-fill Last Week</button>
							<button class="btn ghost" id="resetWorkoutBtn">Reset Day</button>
						</div>
					</div>

					<div class="section-kicker">Notes</div>
					<div class="card card-notes">
						<label class="small" for="workoutNotes">Workout Notes</label>
						<textarea class="input" id="workoutNotes" placeholder="How did the session feel?">${escapeHtml(workout.notes || "")}</textarea>
					</div>
				`;
			}

			function renderWorkoutExercises(workout) {
				if (!workout.exercises.length) {
					return `<p class="small">No exercises in this split yet. Add some in Splits tab.</p>`;
				}
				return workout.exercises.map((ex, idx) => {
					const mode = ex.intensityMode || "normal";
					const modeBadge = mode === "drop"
						? `<span class="mode-badge drop">DROP</span>`
						: mode === "superset"
							? `<span class="mode-badge superset">SUPERSET</span>`
							: "";
					const lastWeek = getExactLastWeekSets(ex.exerciseId, state.selectedDate);
					const lastWeekText = !lastWeek
						? "No exact record from last week"
						: `Last week: ${(lastWeek.sets || []).map((s, i) => `S${i + 1} ${formatSetForDisplay(s, lastWeek.type, lastWeek.intensityMode || mode)}`).join(" • ")}`;
					const cmp = compareWithLastSession(ex.exerciseId, state.selectedDate, ex.sets || []);
					const plateau = getPlateauInsight(ex.exerciseId);
					const cardioSets = ex.type === "cardio"
						? ((ex.sets && ex.sets.length ? ex.sets : [{ durationSec: 0, distanceKm: "" }]))
						: [];
					const strengthSets = ex.type !== "cardio"
						? (ex.sets && ex.sets.length ? ex.sets : [makeEmptyStrengthSet(mode)])
						: [];
					const modeDetailInput = mode === "superset"
						? `<input class="input" placeholder="Superset with (optional)" data-superset-with="${ex.exerciseId}" value="${escapeHtml(ex.supersetWith || "")}" />`
						: mode === "drop"
							? `<input class="input" placeholder="Drop set note (optional)" data-drop-note="${ex.exerciseId}" value="${escapeHtml(ex.dropSetNote || "")}" />`
							: "";
					const cardModeClass = ex.type === "cardio" ? "mode-cardio" : `mode-${mode}`;
					return `
						<div class="exercise-card ${cardModeClass}" data-exercise-id="${ex.exerciseId}">
							<div class="exercise-header">
								<button class="exercise-name" data-history-exercise="${ex.exerciseId}">${idx + 1}. ${escapeHtml(ex.name)}${modeBadge} <span class="tiny">(${ex.type === "cardio" ? "Cardio" : "Strength"})</span></button>
								<button class="btn" data-add-set="${ex.exerciseId}">+ Set</button>
							</div>
							<div class="tiny exercise-meta">${escapeHtml(lastWeekText)}</div>
							<div class="insight">${cmp ? renderInsight(cmp) : "No previous session comparison yet."}</div>
							<div class="intensity-row">
								<select class="input" data-intensity-mode="${ex.exerciseId}">
									<option value="normal" ${(ex.intensityMode || "normal") === "normal" ? "selected" : ""}>Normal</option>
									<option value="drop" ${(ex.intensityMode || "normal") === "drop" ? "selected" : ""}>Drop Set</option>
									<option value="superset" ${(ex.intensityMode || "normal") === "superset" ? "selected" : ""}>Superset</option>
								</select>
								${modeDetailInput}
							</div>
							${plateau ? `<div class="plateau-pill">${escapeHtml(plateau)}</div>` : ""}
							${ex.type === "cardio"
								? `${cardioSets.map((set, i) => {
									const sec = Number(set.durationSec) || 0;
									const mins = sec ? Math.round((sec / 60) * 10) / 10 : "";
									return `<div class="set-row mode-cardio"><div class="set-index">#${i + 1}</div><input class="input" type="number" min="0" step="0.1" placeholder="Time (min)" data-cardio-field="durationMin" data-ex="${ex.exerciseId}" data-idx="${i}" value="${safeNum(mins)}" /><input class="input" type="number" min="0" step="0.1" placeholder="Distance (km)" data-cardio-field="distanceKm" data-ex="${ex.exerciseId}" data-idx="${i}" value="${safeNum(set.distanceKm)}" /><button class="icon-btn" title="Reset cardio set" data-reset-cardio="${ex.exerciseId}" data-idx="${i}">↺</button><button class="icon-btn" title="Remove set" data-remove-set="${ex.exerciseId}" data-idx="${i}">×</button></div>`;
								}).join("")}`
								: strengthSets.map((set, i) => renderStrengthSetRow(ex.exerciseId, i, set, mode)).join("")}
						</div>
					`;
				}).join("");
			}

			function renderStrengthSetRow(exerciseId, index, set, mode) {
				if (mode === "drop") {
					return `
						<div class="set-row wide mode-drop">
							<div class="set-index">#${index + 1}</div>
							<input class="input" type="number" min="0" step="0.5" placeholder="Top W" data-set-input="topWeight" data-ex="${exerciseId}" data-idx="${index}" value="${safeNum(set.topWeight)}" />
							<input class="input" type="number" min="0" step="1" placeholder="Top R" data-set-input="topReps" data-ex="${exerciseId}" data-idx="${index}" value="${safeNum(set.topReps)}" />
							<input class="input" type="number" min="0" step="0.5" placeholder="Drop W" data-set-input="dropWeight" data-ex="${exerciseId}" data-idx="${index}" value="${safeNum(set.dropWeight)}" />
							<input class="input" type="number" min="0" step="1" placeholder="Drop R" data-set-input="dropReps" data-ex="${exerciseId}" data-idx="${index}" value="${safeNum(set.dropReps)}" />
							<button class="icon-btn" title="Remove set" data-remove-set="${exerciseId}" data-idx="${index}">×</button>
						</div>
					`;
				}
				if (mode === "superset") {
					return `
						<div class="set-row wide mode-superset">
							<div class="set-index">#${index + 1}</div>
							<input class="input" type="number" min="0" step="0.5" placeholder="A W" data-set-input="aWeight" data-ex="${exerciseId}" data-idx="${index}" value="${safeNum(set.aWeight)}" />
							<input class="input" type="number" min="0" step="1" placeholder="A R" data-set-input="aReps" data-ex="${exerciseId}" data-idx="${index}" value="${safeNum(set.aReps)}" />
							<input class="input" type="number" min="0" step="0.5" placeholder="B W" data-set-input="bWeight" data-ex="${exerciseId}" data-idx="${index}" value="${safeNum(set.bWeight)}" />
							<input class="input" type="number" min="0" step="1" placeholder="B R" data-set-input="bReps" data-ex="${exerciseId}" data-idx="${index}" value="${safeNum(set.bReps)}" />
							<button class="icon-btn" title="Remove set" data-remove-set="${exerciseId}" data-idx="${index}">×</button>
						</div>
					`;
				}
				return `
					<div class="set-row mode-normal">
						<div class="set-index">#${index + 1}</div>
						<button class="btn bodyweight-btn ${set.bodyweight ? "active" : ""}" title="Toggle bodyweight" data-toggle-bodyweight="${exerciseId}" data-idx="${index}">${set.bodyweight ? "BW" : "KG"}</button>
							${set.bodyweight
								? `<input class="input" type="number" min="0" step="0.1" placeholder="Bodyweight" data-set-input="bodyweightWeight" data-ex="${exerciseId}" data-idx="${index}" value="${safeNum(set.bodyweightWeight)}" />`
								: `<input class="input" type="number" min="0" step="0.5" placeholder="Weight" data-set-input="weight" data-ex="${exerciseId}" data-idx="${index}" value="${safeNum(set.weight)}" />`}
						<input class="input" type="number" min="0" step="1" placeholder="Reps" data-set-input="reps" data-ex="${exerciseId}" data-idx="${index}" value="${safeNum(set.reps)}" />
						<button class="icon-btn" title="Remove set" data-remove-set="${exerciseId}" data-idx="${index}">×</button>
					</div>
				`;
			}

			function renderSplits() {
				return `
					<div class="section-kicker">Split Builder</div>
					<div class="card card-planner">
						<h3 style="margin:0 0 10px;">Create Split</h3>
						<div class="row wrap">
							<input class="input grow" id="newSplitName" placeholder="e.g. Upper Body" />
							<button class="btn primary" id="addSplitBtn">Add Split</button>
						</div>
					</div>

					<div class="section-kicker">Weekly Planner</div>
					<div class="card card-planner">
						<h3 style="margin:0 0 10px;">Weekly Split Planner</h3>
						<p class="small" style="margin:0 0 8px;">Choose your split for each weekday. Rest days are allowed.</p>
						${WEEK_DAYS.map((day, i) => `
							<div class="row wrap" style="margin-top:6px;">
								<label class="small" style="min-width:110px;">${day}</label>
								<select class="input grow" data-schedule-day="${i}">
									<option value="" ${(state.data.settings.weekSchedule[i] || "") === "" ? "selected" : ""}>Rest Day</option>
									${state.data.splits.map((s) => `<option value="${s.id}" ${state.data.settings.weekSchedule[i] === s.id ? "selected" : ""}>${escapeHtml(s.name)}</option>`).join("")}
								</select>
							</div>
						`).join("")}
					</div>

					<div class="section-kicker">Your Split Library</div>
					<div class="card card-splits-list">
						<h3 style="margin:0;">Your Splits</h3>
						<div id="splitList">${state.data.splits.map(renderSplitCard).join("") || `<p class="small">No splits yet.</p>`}</div>
					</div>
				`;
			}

			function renderSplitCard(split) {
				return `
					<div class="split-item" data-split="${split.id}">
						<div class="row wrap">
							<input class="input grow" value="${escapeHtml(split.name)}" data-edit-split-name="${split.id}" />
							<button class="btn danger" data-delete-split="${split.id}">Delete</button>
						</div>
						<div style="margin-top:8px;">
							${(split.exercises || []).map((ex, idx) => `
								<div class="split-ex">
									<input class="input grow" data-edit-ex-name="${split.id}" data-ex-id="${ex.id}" value="${escapeHtml(ex.name)}" />
									<select class="input" style="max-width:120px;" data-edit-ex-type="${split.id}" data-ex-id="${ex.id}">${EXERCISE_TYPES.map((t) => `<option value="${t}" ${ex.type === t ? "selected" : ""}>${t}</option>`).join("")}</select>
									<button class="btn" data-move-ex="up" data-split-id="${split.id}" data-ex-id="${ex.id}" ${idx === 0 ? "disabled" : ""}>↑</button>
									<button class="btn" data-move-ex="down" data-split-id="${split.id}" data-ex-id="${ex.id}" ${idx === split.exercises.length - 1 ? "disabled" : ""}>↓</button>
									<button class="btn danger" data-del-ex="${split.id}" data-ex-id="${ex.id}">×</button>
								</div>
							`).join("")}
						</div>
						<div class="row" style="margin-top:10px;">
							<input class="input grow" placeholder="Add exercise" data-new-ex-input="${split.id}" />
							<select class="input" style="max-width:120px;" data-new-ex-type="${split.id}">${EXERCISE_TYPES.map((t) => `<option value="${t}">${t}</option>`).join("")}</select>
							<button class="btn accent" data-add-ex="${split.id}">Add</button>
						</div>
					</div>
				`;
			}

			function renderCalendar() {
				const cursor = new Date(state.calendarCursor + "T00:00:00");
				const y = cursor.getFullYear();
				const m = cursor.getMonth();
				const first = new Date(y, m, 1);
				const startIdx = first.getDay();
				const daysInMonth = new Date(y, m + 1, 0).getDate();
				const prevDays = new Date(y, m, 0).getDate();

				const cells = [];
				for (let i = startIdx - 1; i >= 0; i--) {
					cells.push(makeDayCell(y, m - 1, prevDays - i, true));
				}
				for (let d = 1; d <= daysInMonth; d++) {
					cells.push(makeDayCell(y, m, d, false));
				}
				while (cells.length % 7 !== 0) {
					const d = cells.length - (startIdx + daysInMonth) + 1;
					cells.push(makeDayCell(y, m + 1, d, true));
				}

				return `
					<div class="card">
						<div class="row">
							<button class="btn" id="prevMonthBtn">←</button>
							<h3 style="margin:0;">${cursor.toLocaleDateString(undefined, { month: "long", year: "numeric" })}</h3>
							<button class="btn right" id="nextMonthBtn">→</button>
						</div>
						<div class="calendar-head">${DAYS.map((d) => `<div>${d}</div>`).join("")}</div>
						<div class="calendar-grid">${cells.join("")}</div>
					</div>

					<div class="card">
						<h3 style="margin:0 0 8px;">Selected Day</h3>
						${renderSelectedDaySummary()}
					</div>
				`;
			}

			function makeDayCell(year, month, day, otherMonth) {
				const date = new Date(year, month, day);
				const iso = toISO(date);
				const today = iso === todayISO();
				const hasWorkout = !!state.data.workouts[iso];
				const holiday = getHoliday(iso);
				const isPast = iso < todayISO();
				const missed = state.data.settings.showMissedDays && isPast && !hasWorkout && !holiday;
				return `<button class="day ${otherMonth ? "other" : ""} ${today ? "today" : ""} ${hasWorkout ? "worked" : ""} ${holiday ? "holiday" : ""} ${missed && !otherMonth ? "missed" : ""}" data-day="${iso}" title="${holiday ? escapeHtml(holiday.name) : ""}">${date.getDate()}</button>`;
			}

			function renderSelectedDaySummary() {
				const w = state.data.workouts[state.selectedDate];
				const holiday = getHoliday(state.selectedDate);
				if (!w && holiday) return `<p class="small"><strong>${escapeHtml(holiday.name)}</strong> (holiday)</p>`;
				if (!w) return `<p class="small">No workout saved for ${fmtDisplayDate(state.selectedDate)}.</p>`;
				const totalSets = w.exercises.reduce((n, ex) => n + (ex.sets || []).length, 0);
				return `
					<p style="margin:0 0 6px;"><strong>${escapeHtml(w.splitName || "Workout")}</strong> • ${totalSets} sets</p>
					${w.cardio && w.cardio.enabled ? `<p class="small" style="margin:0 0 6px;">Cardio: ${formatDuration(w.cardio.durationSec || 0)}${safeNum(w.cardio.distanceKm) ? ` • ${safeNum(w.cardio.distanceKm)} km` : ""}</p>` : ""}
					<p class="small" style="margin:0 0 10px;">${escapeHtml(w.notes || "No notes")}</p>
					<button class="btn primary" id="editSelectedWorkoutBtn">Edit This Workout</button>
				`;
			}

			function renderAnalytics() {
				const exerciseOptions = listAllExercises().map((ex) => `<option value="${ex.id}">${escapeHtml(ex.name)}</option>`).join("");
				if (!state.analyticsExerciseId) {
					const first = listAllExercises()[0];
					state.analyticsExerciseId = first ? first.id : "";
				}
				const metrics = calcMetrics();
				const exStats = state.analyticsExerciseId ? getExerciseStats(state.analyticsExerciseId) : null;

				return `
					<div class="card">
						<h3 style="margin:0 0 10px;">Overview</h3>
						<div class="metrics">
							<div class="metric"><h4>${metrics.totalWorkouts}</h4><p>Total Workouts</p></div>
							<div class="metric"><h4>${metrics.weeklyWorkouts}</h4><p>Last 7 Days</p></div>
							<div class="metric"><h4>${metrics.avgSets}</h4><p>Avg Sets / Workout</p></div>
							<div class="metric"><h4>${calcDisciplineStats().consistency}%</h4><p>30-Day Consistency</p></div>
						</div>
					</div>

					<div class="card">
						<div class="row wrap">
							<h3 style="margin:0;">Exercise Progress</h3>
							<select class="input grow" id="analyticsExerciseSelect">${exerciseOptions}</select>
						</div>
						<div class="chart-wrap" style="margin-top:10px;">
							<canvas id="progressChart" width="720" height="260"></canvas>
						</div>
						<p class="small" id="chartHint" style="margin:8px 0 0;"></p>
						${exStats ? `<p class="small" style="margin:6px 0 0;">Best weight: <strong>${exStats.bestWeight}</strong> • Best reps: <strong>${exStats.bestReps}</strong> • Best e1RM: <strong>${exStats.bestE1RM}</strong></p>` : ""}
					</div>
				`;
			}

			function renderSettings() {
				const discipline = calcDisciplineStats();
				const holidayRows = (state.data.settings.holidays || [])
					.slice()
					.sort((a, b) => a.date.localeCompare(b.date))
					.map((h) => `<div class="row" style="margin-top:6px;"><span class="small grow">${h.date} • ${escapeHtml(h.name)}</span><button class="btn danger" data-del-holiday="${h.date}">Remove</button></div>`)
					.join("") || `<p class="small">No holidays added.</p>`;
				return `
					<div class="card">
						<h3 style="margin:0 0 10px;">Discipline</h3>
						<p class="small" style="margin:0 0 6px;">Current streak: <strong>${discipline.streak}</strong></p>
						<p class="small" style="margin:0 0 6px;">Missed days (last 30): <strong>${discipline.missedDays30}</strong></p>
						<p class="small" style="margin:0;">Consistency (last 30): <strong>${discipline.consistency}%</strong></p>
					</div>

					<div class="card">
						<h3 style="margin:0 0 10px;">Backup & Restore</h3>
						<div class="row wrap">
							<button class="btn success" id="exportBtn">Export JSON</button>
							<label class="btn warn" for="importInput">Import JSON</label>
							<input type="file" id="importInput" accept="application/json" style="display:none;" />
						</div>
						<p class="small">Import validates structure and blocks corrupt data.</p>
					</div>

					<div class="card">
						<h3 style="margin:0 0 10px;">Preferences</h3>
						<label class="row" style="justify-content: space-between;">
							<span>Show missed workout indicators</span>
							<input type="checkbox" id="showMissed" ${state.data.settings.showMissedDays ? "checked" : ""} />
						</label>
					</div>

					<div class="card">
						<h3 style="margin:0 0 10px;">Data Options: Logging Types</h3>
						<p class="small" style="margin:0 0 6px;"><strong>Normal:</strong> each set logs Weight + Reps.</p>
						<p class="small" style="margin:0 0 6px;"><strong>Drop Set:</strong> each set logs Top Weight/Reps and Drop Weight/Reps.</p>
						<p class="small" style="margin:0;"><strong>Superset:</strong> each round logs A Weight/Reps and B Weight/Reps.</p>
					</div>

					<div class="card">
						<h3 style="margin:0 0 10px;">Holidays</h3>
						<div class="row wrap">
							<input type="date" id="holidayDate" class="input" style="max-width:170px;" />
							<input id="holidayName" class="input grow" placeholder="Holiday name" />
							<button id="addHolidayBtn" class="btn accent">Add Holiday</button>
						</div>
						<div style="margin-top:8px;">${holidayRows}</div>
					</div>

					<div class="card">
						<h3 style="margin:0 0 10px;">Data Safety</h3>
						<button class="btn danger" id="clearAllBtn">Clear All Data</button>
						<p class="tiny">This cannot be undone.</p>
					</div>
				`;
			}

			function bindGlobalEvents() {
				const root = $("app");
				root.querySelectorAll("[data-tab]").forEach((el) => {
					el.onclick = () => {
						state.view = el.dataset.tab;
						render();
					};
				});

				const saveBtn = $("quickSaveBtn");
				if (saveBtn) saveBtn.onclick = () => { saveCurrentWorkout(); };

				if (state.view === "today") bindTodayEvents(root);
				if (state.view === "splits") bindSplitsEvents(root);
				if (state.view === "calendar") bindCalendarEvents(root);
				if (state.view === "analytics") bindAnalyticsEvents(root);
				if (state.view === "settings") bindSettingsEvents(root);

				$("closeModal").onclick = closeHistoryModal;
				$("closeSummaryModal").onclick = closeSummaryModal;
				$("historyModal").onclick = (e) => { if (e.target.id === "historyModal") closeHistoryModal(); };
				$("summaryModal").onclick = (e) => { if (e.target.id === "summaryModal") closeSummaryModal(); };
			}

			function bindTodayEvents(root) {
				const dateInput = root.querySelector("#workoutDate");
				const splitSelect = root.querySelector("#splitSelect");
				const notes = root.querySelector("#workoutNotes");
				const workout = getWorkoutOrDefault(state.selectedDate);
				if (splitSelect && workout.splitId) splitSelect.value = workout.splitId;

				if (dateInput) {
					dateInput.onchange = () => {
						state.selectedDate = dateInput.value || todayISO();
						render();
					};
				}

				const applySplitBtn = root.querySelector("#applySplitBtn");
				if (applySplitBtn) {
					applySplitBtn.onclick = () => {
						const split = getSplitById(splitSelect.value);
						if (!split) return;
						const dayWorkout = getOrInitWorkout(state.selectedDate);
						dayWorkout.splitId = split.id;
						dayWorkout.splitName = split.name;
						syncWorkoutExercisesToSplit(dayWorkout, split);
						autosave();
						toast("Split applied");
						render();
					};
				}

				const busyShiftWeekBtn = root.querySelector("#busyShiftWeekBtn");
				if (busyShiftWeekBtn) {
					busyShiftWeekBtn.onclick = () => applyBusyDayShift(state.selectedDate);
				}

				const clearWeekShiftBtn = root.querySelector("#clearWeekShiftBtn");
				if (clearWeekShiftBtn) {
					clearWeekShiftBtn.onclick = () => {
						if (!confirm("Revert temporary shift for this week and use the normal planner?")) return;
						clearWeekOverrideForDate(state.selectedDate);
					};
				}

				if (notes) {
					notes.oninput = () => {
						const dayWorkout = getOrInitWorkout(state.selectedDate);
						dayWorkout.notes = notes.value;
						dayWorkout.updatedAt = new Date().toISOString();
						autosave();
					};
				}

				root.querySelectorAll("[data-add-set]").forEach((btn) => {
					btn.onclick = () => {
						const exId = btn.dataset.addSet;
						const ex = workout.exercises.find((x) => x.exerciseId === exId);
						if (!ex) return;
						if (!Array.isArray(ex.sets)) ex.sets = [];
						ex.sets.push(ex.type === "cardio" ? { durationSec: 0, distanceKm: "" } : makeEmptyStrengthSet(ex.intensityMode || "normal"));
						autosave();
						render();
					};
				});

				root.querySelectorAll("[data-remove-set]").forEach((btn) => {
					btn.onclick = () => {
						const exId = btn.dataset.removeSet;
						const idx = Number(btn.dataset.idx);
						const ex = workout.exercises.find((x) => x.exerciseId === exId);
						if (!ex) return;
						ex.sets.splice(idx, 1);
						autosave();
						render();
					};
				});

				root.querySelectorAll("[data-set-input]").forEach((inp) => {
					inp.oninput = () => {
						const exId = inp.dataset.ex;
						const idx = Number(inp.dataset.idx);
						const field = inp.dataset.setInput;
						const ex = workout.exercises.find((x) => x.exerciseId === exId);
						if (!ex || !ex.sets[idx]) return;
						ex.sets[idx][field] = inp.value;
						ex.updatedAt = new Date().toISOString();
						autosave();
					};
				});

				root.querySelectorAll("[data-toggle-bodyweight]").forEach((btn) => {
					btn.onclick = () => {
						const exId = btn.dataset.toggleBodyweight;
						const idx = Number(btn.dataset.idx);
						const ex = workout.exercises.find((x) => x.exerciseId === exId);
						if (!ex || !ex.sets || !ex.sets[idx]) return;
						ex.sets[idx].bodyweight = !ex.sets[idx].bodyweight;
						if (ex.sets[idx].bodyweight) {
							ex.sets[idx].weight = "";
								ex.sets[idx].bodyweightWeight = ex.sets[idx].bodyweightWeight || "";
						}
						autosave();
						render();
					};
				});

				root.querySelectorAll("[data-intensity-mode]").forEach((sel) => {
					sel.onchange = () => {
						const ex = workout.exercises.find((x) => x.exerciseId === sel.dataset.intensityMode);
						if (!ex) return;
						const nextMode = ["normal", "drop", "superset"].includes(sel.value) ? sel.value : "normal";
						ex.intensityMode = nextMode;
						ex.sets = (ex.sets || []).map((s) => normalizeStrengthSetByMode(s, nextMode));
						if (!ex.sets.length) ex.sets = [makeEmptyStrengthSet(nextMode)];
						if (ex.intensityMode !== "superset") ex.supersetWith = "";
						if (ex.intensityMode !== "drop") ex.dropSetNote = "";
						autosave();
						render();
					};
				});

				root.querySelectorAll("[data-superset-with]").forEach((inp) => {
					inp.oninput = () => {
						const ex = workout.exercises.find((x) => x.exerciseId === inp.dataset.supersetWith);
						if (!ex) return;
						ex.supersetWith = inp.value;
						autosave();
					};
				});

				root.querySelectorAll("[data-drop-note]").forEach((inp) => {
					inp.oninput = () => {
						const ex = workout.exercises.find((x) => x.exerciseId === inp.dataset.dropNote);
						if (!ex) return;
						ex.dropSetNote = inp.value;
						autosave();
					};
				});

				root.querySelectorAll("[data-history-exercise]").forEach((btn) => {
					btn.onclick = () => {
						const exId = btn.dataset.historyExercise;
						openHistoryModal(exId);
					};
				});

				const saveWorkoutBtn = root.querySelector("#saveWorkoutBtn");
				if (saveWorkoutBtn) saveWorkoutBtn.onclick = () => saveCurrentWorkout();

				root.querySelectorAll("[data-cardio-field]").forEach((inp) => {
					inp.oninput = () => {
						const ex = workout.exercises.find((x) => x.exerciseId === inp.dataset.ex);
						if (!ex) return;
						if (!ex.sets || !ex.sets.length) ex.sets = [{ durationSec: 0, distanceKm: "" }];
						const idx = Number(inp.dataset.idx);
						const setIdx = Number.isInteger(idx) && idx >= 0 ? idx : 0;
						if (!ex.sets[setIdx]) ex.sets[setIdx] = { durationSec: 0, distanceKm: "" };
						if (inp.dataset.cardioField === "durationMin") {
							const mins = Math.max(0, Number(inp.value) || 0);
							ex.sets[setIdx].durationSec = Math.round(mins * 60);
						} else {
							ex.sets[setIdx][inp.dataset.cardioField] = inp.value;
						}
						autosave();
					};
				});
				root.querySelectorAll("[data-reset-cardio]").forEach((btn) => {
					btn.onclick = () => {
						const ex = workout.exercises.find((x) => x.exerciseId === btn.dataset.resetCardio);
						if (!ex) return;
						const idx = Number(btn.dataset.idx);
						const setIdx = Number.isInteger(idx) && idx >= 0 ? idx : 0;
						if (!ex.sets || !ex.sets.length) ex.sets = [{ durationSec: 0, distanceKm: "" }];
						ex.sets[setIdx] = { durationSec: 0, distanceKm: "" };
						autosave();
						render();
					};
				});

				const autoFillBtn = root.querySelector("#autofillLastWeekBtn");
				if (autoFillBtn) autoFillBtn.onclick = () => autofillFromLastWeek();

				const resetWorkoutBtn = root.querySelector("#resetWorkoutBtn");
				if (resetWorkoutBtn) {
					resetWorkoutBtn.onclick = () => {
						if (!confirm("Reset this day's inputs?")) return;
						const day = getOrInitWorkout(state.selectedDate);
						day.exercises.forEach((ex) => { ex.sets = []; });
						day.notes = "";
						day.updatedAt = new Date().toISOString();
						autosave();
						toast("Day reset");
						render();
					};
				}
			}

			function bindSplitsEvents(root) {
				root.querySelector("#addSplitBtn").onclick = () => {
					const inp = root.querySelector("#newSplitName");
					const name = (inp.value || "").trim();
					if (!name) return toast("Enter a split name");
					state.data.splits.push({ id: uid("sp"), name, exercises: [] });
					inp.value = "";
					autosave();
					toast("Split created");
					render();
				};

				root.querySelectorAll("[data-edit-split-name]").forEach((inp) => {
					inp.onchange = () => {
						const split = getSplitById(inp.dataset.editSplitName);
						if (!split) return;
						const next = (inp.value || "").trim();
						if (!next) return render();
						split.name = next;
						syncWorkoutsUsingSplitFromDate(split.id, todayISO());
						autosave();
						toast("Split renamed");
						render();
					};
				});

				root.querySelectorAll("[data-delete-split]").forEach((btn) => {
					btn.onclick = () => {
						const splitId = btn.dataset.deleteSplit;
						const split = getSplitById(splitId);
						if (!split) return;
						if (!confirm(`Delete split "${split.name}"?`)) return;
						state.data.splits = state.data.splits.filter((s) => s.id !== splitId);
						state.data.settings.weekSchedule = (state.data.settings.weekSchedule || ["", "", "", "", "", "", ""]).map((id) => (id === splitId ? "" : id));
						if (state.data.settings.weekOverrides && typeof state.data.settings.weekOverrides === "object") {
							Object.values(state.data.settings.weekOverrides).forEach((row) => {
								if (!row || !Array.isArray(row.schedule)) return;
								row.schedule = row.schedule.map((id) => (id === splitId ? "" : id));
							});
						}
						autosave();
						toast("Split deleted");
						render();
					};
				});

				root.querySelectorAll("[data-schedule-day]").forEach((sel) => {
					sel.onchange = () => {
						const dayIdx = Number(sel.dataset.scheduleDay);
						if (!Number.isInteger(dayIdx) || dayIdx < 0 || dayIdx > 6) return;
						if (!Array.isArray(state.data.settings.weekSchedule)) state.data.settings.weekSchedule = ["", "", "", "", "", "", ""];
						state.data.settings.weekSchedule[dayIdx] = sel.value || "";
						autosave();
						toast("Weekly split updated");
					};
				});

				root.querySelectorAll("[data-add-ex]").forEach((btn) => {
					btn.onclick = () => {
						const split = getSplitById(btn.dataset.addEx);
						const inp = root.querySelector(`[data-new-ex-input='${btn.dataset.addEx}']`);
						const typeSel = root.querySelector(`[data-new-ex-type='${btn.dataset.addEx}']`);
						if (!split || !inp) return;
						const name = (inp.value || "").trim();
						if (!name) return toast("Enter exercise name");
						split.exercises.push({ id: uid("ex"), name, type: typeSel && EXERCISE_TYPES.includes(typeSel.value) ? typeSel.value : "strength" });
						inp.value = "";
						syncWorkoutsUsingSplitFromDate(split.id, todayISO());
						autosave();
						render();
					};
				});

				root.querySelectorAll("[data-edit-ex-name]").forEach((inp) => {
					inp.onchange = () => {
						const split = getSplitById(inp.dataset.editExName);
						if (!split) return;
						const ex = split.exercises.find((e) => e.id === inp.dataset.exId);
						if (!ex) return;
						const next = (inp.value || "").trim();
						if (!next) return render();
						ex.name = next;
						syncWorkoutsUsingSplitFromDate(split.id, todayISO());
						autosave();
						render();
					};
				});

				root.querySelectorAll("[data-edit-ex-type]").forEach((sel) => {
					sel.onchange = () => {
						const split = getSplitById(sel.dataset.editExType);
						if (!split) return;
						const ex = split.exercises.find((e) => e.id === sel.dataset.exId);
						if (!ex) return;
						ex.type = EXERCISE_TYPES.includes(sel.value) ? sel.value : "strength";
						syncWorkoutsUsingSplitFromDate(split.id, todayISO());
						autosave();
						render();
					};
				});

				root.querySelectorAll("[data-del-ex]").forEach((btn) => {
					btn.onclick = () => {
						const split = getSplitById(btn.dataset.delEx);
						if (!split) return;
						split.exercises = split.exercises.filter((e) => e.id !== btn.dataset.exId);
						syncWorkoutsUsingSplitFromDate(split.id, todayISO());
						autosave();
						render();
					};
				});

				root.querySelectorAll("[data-move-ex]").forEach((btn) => {
					btn.onclick = () => {
						const split = getSplitById(btn.dataset.splitId);
						if (!split) return;
						const i = split.exercises.findIndex((e) => e.id === btn.dataset.exId);
						if (i < 0) return;
						const dir = btn.dataset.moveEx;
						const j = dir === "up" ? i - 1 : i + 1;
						if (j < 0 || j >= split.exercises.length) return;
						const tmp = split.exercises[i];
						split.exercises[i] = split.exercises[j];
						split.exercises[j] = tmp;
						syncWorkoutsUsingSplitFromDate(split.id, todayISO());
						autosave();
						render();
					};
				});
			}
